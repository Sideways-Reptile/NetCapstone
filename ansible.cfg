[defaults]
vault_password_file = ~/.vault_pass
inventory         = ansible_inventory.yml
host_key_checking = False
timeout           = 30
retry_files_enabled = False
stdout_callback   = default
interpreter_python = auto_silent

[persistent_connection]
command_timeout   = 30
connect_timeout   = 30

[ssh_connection]
ssh_args = -o StrictHostKeyChecking=no -o KexAlgorithms=+diffie-hellman-group14-sha1 -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedKeyTypes=+ssh-rsa
pipelining = False
usetty = False
