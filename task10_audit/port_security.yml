---
# ============================================================
# Task 10 — Port Security: Sticky MAC + Port Isolation
# Bigfork IT GNS3 Capstone
#
# Usage:
#   ansible-playbook -i ansible_inventory.yml task10_audit/port_security.yml
#   ansible-playbook -i ansible_inventory.yml task10_audit/port_security.yml --limit SW4-ACCESS1-CORP
#   ansible-playbook -i ansible_inventory.yml task10_audit/port_security.yml --tags verify
#
# Design:
#   Sticky MAC  → SW4-ACCESS1-CORP port 3 (CORP devices)
#               → SW5-ACCESS2-DMZ  port 3 (FILE-SVR1)
#               → BR-SW1           ports 2-3 (Branch devices)
#   Port Isolation → ALL access ports including GUEST (SW3-DIST-2 port 4)
#   NEVER lock or isolate trunk ports
#
# PATCH NOTES:
#   - Replaced 'learn-until-lock' with 'first-arrival' syntax — correct EXOS method
#   - Removed per-VLAN MAC locking — EXOS first-arrival works at port level
#   - Added 'learn-limit-action remain-enabled' — port stays UP on violation,
#     drops unknown MAC traffic instead of shutting the port down.
#     This means: unplug locked device, plug in rogue device = traffic blocked.
#     Plug original device back in = works immediately, no admin intervention.
#   - Added 'link-down-action retain-macs' — locked MAC survives link flap.
#     Without this, a link bounce clears the lock and re-learns on next connect.
#   - Added trap + log violation — violations appear in syslog on Ubu-WS01.
# ============================================================

# ── HQ ACCESS SWITCHES ───────────────────────────────────────────────────────

- name: "Port Security — Sticky MAC on CORP and DMZ Access Ports"
  hosts: SW4-ACCESS1-CORP,SW5-ACCESS2-DMZ
  gather_facts: false
  vars:

  tasks:

    - name: "Enable MAC locking globally"
      ansible.builtin.raw: "enable mac-locking"
      tags: [mac_lock, configure]

    - name: "Pause after global enable — allow EXOS to process"
      ansible.builtin.pause:
        seconds: 3
      tags: [mac_lock, configure]

    - name: "Enable MAC locking on port 3"
      ansible.builtin.raw: "enable mac-locking ports 3"
      tags: [mac_lock, configure]

    - name: "Configure first-arrival MAC lock — limit to 1 MAC"
      ansible.builtin.raw: "configure mac-locking ports 3 first-arrival limit-learning 1"
      tags: [mac_lock, configure]

    - name: "Configure retain-macs on link-down — survives cable unplug"
      ansible.builtin.raw: "configure mac-locking ports 3 first-arrival link-down-action retain-macs"
      tags: [mac_lock, configure]

    - name: "Configure violation action — remain-enabled (port stays UP, drops rogue traffic)"
      ansible.builtin.raw: "configure mac-locking ports 3 learn-limit-action remain-enabled"
      tags: [mac_lock, configure]

    - name: "Configure violation trap — sends SNMP trap on violation"
      ansible.builtin.raw: "configure mac-locking ports 3 trap violation on"
      tags: [mac_lock, configure]

    - name: "Configure violation log — logs to syslog on violation"
      ansible.builtin.raw: "configure mac-locking ports 3 log violation on"
      tags: [mac_lock, configure]

    - name: "Enable port isolation on access port 3"
      ansible.builtin.raw: "configure port 3 isolation on"
      tags: [isolation, configure]

    - name: "Save configuration"
      ansible.builtin.raw: "save configuration"
      tags: [mac_lock, isolation, configure]

    - name: "Verify MAC locking"
      ansible.builtin.raw: "show mac-locking ports 3"
      register: mac_lock_output
      changed_when: false
      tags: [verify]

    - name: "Verify port isolation"
      ansible.builtin.raw: "show ports information detail | grep 'Isolation'"
      register: isolation_output
      changed_when: false
      tags: [verify]

    - name: "Display MAC lock status"
      ansible.builtin.debug:
        msg: "{{ mac_lock_output.stdout_lines }}"
      tags: [verify]

    - name: "Display isolation status"
      ansible.builtin.debug:
        msg: "{{ isolation_output.stdout_lines }}"
      tags: [verify]


# ── GUEST PORT — ISOLATION ONLY ──────────────────────────────────────────────

- name: "Port Security — Port Isolation on GUEST Port (SW3-DIST-2)"
  hosts: SW3-DIST-2
  gather_facts: false
  vars:

  tasks:

    - name: "GUEST — port isolation only on port 4 (WS-Gst)"
      ansible.builtin.raw: "configure port 4 isolation on"
      tags: [isolation, configure]
      # NOTE: No MAC locking on GUEST — high-churn environment.
      # Port isolation forces all GUEST traffic through pfSense firewall.
      # pfSense GUEST rules handle the actual RFC1918 blocking.

    - name: "Save configuration"
      ansible.builtin.raw: "save configuration"
      tags: [isolation, configure]

    - name: "Verify port isolation on GUEST port"
      ansible.builtin.raw: "show ports information detail | grep Isolation"
      register: guest_isolation
      changed_when: false
      tags: [verify]

    - name: "Display GUEST isolation status"
      ansible.builtin.debug:
        msg: "{{ guest_isolation.stdout_lines }}"
      tags: [verify]


# ── BRANCH SWITCH ─────────────────────────────────────────────────────────────

- name: "Port Security — Branch Switch (BR-SW1)"
  hosts: BR-SW1
  gather_facts: false
  vars:

  tasks:

    - name: "Enable MAC locking globally on Branch switch"
      ansible.builtin.raw: "enable mac-locking"
      tags: [mac_lock, configure]

    - name: "Pause after global enable — allow EXOS to process"
      ansible.builtin.pause:
        seconds: 3
      tags: [mac_lock, configure]

    - name: "Enable MAC locking on ports 2 and 3"
      ansible.builtin.raw: |
        enable mac-locking ports 2
        enable mac-locking ports 3
      tags: [mac_lock, configure]

    - name: "Configure first-arrival MAC lock — port 2, limit 1 MAC"
      ansible.builtin.raw: "configure mac-locking ports 2 first-arrival limit-learning 1"
      tags: [mac_lock, configure]

    - name: "Configure first-arrival MAC lock — port 3, limit 1 MAC"
      ansible.builtin.raw: "configure mac-locking ports 3 first-arrival limit-learning 1"
      tags: [mac_lock, configure]

    - name: "Configure retain-macs on link-down — ports 2 and 3"
      ansible.builtin.raw: |
        configure mac-locking ports 2 first-arrival link-down-action retain-macs
        configure mac-locking ports 3 first-arrival link-down-action retain-macs
      tags: [mac_lock, configure]

    - name: "Configure violation action — remain-enabled on ports 2 and 3"
      ansible.builtin.raw: |
        configure mac-locking ports 2 learn-limit-action remain-enabled
        configure mac-locking ports 3 learn-limit-action remain-enabled
      tags: [mac_lock, configure]

    - name: "Configure violation trap and log — ports 2 and 3"
      ansible.builtin.raw: |
        configure mac-locking ports 2 trap violation on
        configure mac-locking ports 2 log violation on
        configure mac-locking ports 3 trap violation on
        configure mac-locking ports 3 log violation on
      tags: [mac_lock, configure]

    - name: "Branch — port isolation on ports 2 and 3"
      ansible.builtin.raw: |
        configure port 2 isolation on
        configure port 3 isolation on
      tags: [isolation, configure]

    - name: "Save Branch switch configuration"
      ansible.builtin.raw: "save configuration"
      tags: [mac_lock, isolation, configure]

    - name: "Verify Branch MAC locking"
      ansible.builtin.raw: "show mac-locking"
      register: branch_mac
      changed_when: false
      tags: [verify]

    - name: "Verify Branch port isolation"
      ansible.builtin.raw: "show ports information detail | grep Isolation"
      register: branch_iso
      changed_when: false
      tags: [verify]

    - name: "Display Branch port security status"
      ansible.builtin.debug:
        msg:
          - "MAC Locking: {{ branch_mac.stdout_lines }}"
          - "Isolation:   {{ branch_iso.stdout_lines }}"
      tags: [verify]
